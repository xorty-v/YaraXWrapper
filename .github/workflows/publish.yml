name: Build, test and publish

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-pack-publish:
    runs-on: windows-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download YARA-X C API
        shell: pwsh
        run: |
          $ver = ([xml](Get-Content Directory.Build.props)).Project.PropertyGroup.YaraXCapiVersion
          if (-not $ver) { throw "YaraXCapiVersion not found in Directory.Build.props" }

          $targetDir = "src/YaraXWrapper/yara_x_capi/$ver"
          New-Item -ItemType Directory -Force -Path $targetDir

          Invoke-WebRequest `
            -Uri "https://github.com/VirusTotal/yara-x/releases/download/v$ver/yara-x-capi-v$ver-x86_64-pc-windows-msvc.zip" `
            -OutFile "yara-x-capi.zip"

          Expand-Archive "yara-x-capi.zip" -DestinationPath "yara-x-capi"

          $dll = Get-ChildItem "yara-x-capi" -Recurse -Filter "yara_x_capi.dll" | Select-Object -First 1

          if ($null -eq $dll) {
            throw "yara_x_capi.dll was not found in downloaded archive."
          }

          Copy-Item $dll.FullName "$targetDir/yara_x_capi.dll"

      - name: Restore
        run: dotnet restore YaraXWrapper.sln

      - name: Build
        run: dotnet build YaraXWrapper.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test YaraXWrapper.sln --configuration Release --no-build

      - name: Determine package version
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $version = ([xml](Get-Content src/YaraXWrapper/YaraXWrapper.csproj)).Project.PropertyGroup.Version
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Package version: $version"

      - name: Pack
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: dotnet pack src/YaraXWrapper/YaraXWrapper.csproj --configuration Release --output artifacts /p:PackageVersion=${{ env.PACKAGE_VERSION }}

      - name: List artifacts
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: Get-ChildItem -Recurse artifacts

      - name: NuGet login
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: x1m

      - name: Publish NuGet package
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $package = Get-ChildItem "artifacts" -Filter "*.nupkg" | Where-Object { $_.Name -notlike "*.symbols.nupkg" } | Select-Object -First 1

          if ($null -eq $package) {
            throw "No .nupkg file found in artifacts."
          }

          dotnet nuget push $package.FullName `
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" `
            --source "https://api.nuget.org/v3/index.json" `
            --skip-duplicate
